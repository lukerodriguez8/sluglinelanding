<!doctype html>
<html lang="en" style="background-color: #000000; color-scheme: dark;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="color-scheme" content="dark" />
    <title>SLUGLINE STUDIO</title>
    <style>
      /* 
        ROOT CAUSE FIX: 
        We set the background to pure black at the most primitive level.
        No extra elements, no loaders, no shells. 
        This ensures the browser stays black from the first byte to the last.
      */
      html, body { 
        background-color: #000000 !important; 
        margin: 0; 
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
      }
      #root {
        background-color: #000000 !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="src/main.tsx"></script>
  </body>
</html>
